<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InfinexPay Bulk STK Push</title>
    <style>
        body { font-family: system-ui, sans-serif; background: #f4f6f9; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { margin-top: 0; color: #111; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; }
        input, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        textarea { height: 100px; resize: vertical; }
        button { width: 100%; padding: 12px; background: #0066cc; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; font-weight: bold; }
        button:hover { background: #0052a3; }
        #status { margin-top: 15px; padding: 10px; border-radius: 4px; display: none; }
        .info { background: #e3f2fd; color: #0d47a1; }
    </style>
</head>
<body>

<div class="container">
    <h2>Bulk STK Push Panel</h2>
    <div class="form-group">
        <label for="numbers">Phone Numbers (One per line or comma-separated)</label>
        <textarea id="numbers" placeholder="254712345678&#10;254787654321"></textarea>
    </div>
    <div class="form-group">
        <label for="amount">Amount (KES)</label>
        <input type="number" id="amount" placeholder="10" min="1">
    </div>
    <div class="form-group">
        <label for="reference">Base Reference</label>
        <input type="text" id="reference" placeholder="BULK-INV">
    </div>
    <div class="form-group">
        <label for="description">Description</label>
        <input type="text" id="description" value="Bulk payment collection">
    </div>
    <button onclick="triggerBulkStk()">Trigger Bulk Push</button>
    <div id="status"></div>
</div>

<script>
    async function triggerBulkStk() {
        const rawNumbers = document.getElementById('numbers').value;
        const amount = document.getElementById('amount').value;
        const reference = document.getElementById('reference').value;
        const description = document.getElementById('description').value;
        const statusDiv = document.getElementById('status');

        if (!rawNumbers || !amount || !reference) {
            alert('Please fill all mandatory fields');
            return;
        }

        // Clean up numbers input array
        const numbers = rawNumbers.split(/[\n,]+/).map(n => n.trim()).filter(n => n.length > 0);

        statusDiv.className = 'status info';
        statusDiv.style.display = 'block';
        statusDiv.innerText = 'Submitting bulk job to task queue...';

        try {
            const response = await fetch('/api/bulk-stk', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ numbers, amount, reference, description })
            });
            const result = await response.json();
            statusDiv.innerText = result.message || result.error;
        } catch (err) {
            statusDiv.innerText = 'Network error submitting requests.';
        }
    }
</script>
</body>
</html>
